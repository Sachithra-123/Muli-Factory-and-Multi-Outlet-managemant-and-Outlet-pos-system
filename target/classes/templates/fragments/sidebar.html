<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Sidebar layout for navigation -->
<nav th:fragment="sidebar" id="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-building-gear fs-4 me-2 text-primary"></i>
        <span>DSI FMS</span>
    </div>

    <ul class="sidebar-nav">
        <li class="nav-label">Main</li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/dashboard}" th:classappend="${currentUri == '/dashboard'} ? 'active' : ''">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </li>

        <li class="nav-label" sec:authorize="hasRole('ADMIN')">Inventory</li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/products}" th:classappend="${currentUri.startsWith('/products')} ? 'active' : ''">
                <i class="bi bi-box-seam"></i> Products
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/factories}" th:classappend="${currentUri.startsWith('/factories')} ? 'active' : ''">
                <i class="bi bi-building"></i> Factories
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/factory-stock}" th:classappend="${currentUri.startsWith('/factory-stock')} ? 'active' : ''">
                <i class="bi bi-archive"></i> Factory Stock
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/outlets}" th:classappend="${currentUri.startsWith('/outlets')} ? 'active' : ''">
                <i class="bi bi-shop"></i> Outlets
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/transfers}" th:classappend="${currentUri.startsWith('/transfers')} ? 'active' : ''">
                <i class="bi bi-arrow-left-right"></i> Stock Transfer
            </a>
        </li>

        <li class="nav-label">Sales</li>
        <li>
            <a th:href="@{/pos}" th:classappend="${currentUri == '/pos'} ? 'active' : ''">
                <i class="bi bi-cart3"></i> POS / Sale
            </a>
        </li>
        <li>
            <a th:href="@{/sales}" th:classappend="${currentUri.startsWith('/sales')} ? 'active' : ''">
                <i class="bi bi-receipt"></i> Sales History
            </a>
        </li>

        <li class="nav-label" sec:authorize="hasRole('ADMIN')">HR</li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/employees}" th:classappend="${currentUri.startsWith('/employees')} ? 'active' : ''">
                <i class="bi bi-people"></i> Employees
            </a>
        </li>

        <li class="nav-label" sec:authorize="hasRole('ADMIN')">Reports</li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/reports/sales}" th:classappend="${currentUri == '/reports/sales'} ? 'active' : ''">
                <i class="bi bi-bar-chart"></i> Sales Report
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/reports/stock}" th:classappend="${currentUri == '/reports/stock'} ? 'active' : ''">
                <i class="bi bi-clipboard-data"></i> Stock Report
            </a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/reports/transfers}" th:classappend="${currentUri == '/reports/transfers'} ? 'active' : ''">
                <i class="bi bi-truck"></i> Transfer Report
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">
                <i class="bi bi-box-arrow-left me-2"></i>Logout
            </button>
        </form>
    </div>
</nav>

<!-- Top navbar with the page title and user info -->
<nav th:fragment="navbar" class="top-navbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebarToggle">
        <i class="bi bi-list fs-5"></i>
    </button>
    <div class="navbar-title" id="pageTitle">Dashboard</div>
    <div class="navbar-user">
        <div class="user-info">
            <i class="bi bi-person-circle fs-5 me-1"></i>
            <span sec:authentication="name">User</span>
            <span class="badge bg-warning text-dark ms-2 small" sec:authorize="hasRole('ADMIN')">Admin</span>
            <span class="badge bg-info text-dark ms-2 small" sec:authorize="hasRole('CASHIER')">Cashier</span>
        </div>
    </div>
</nav>

</body>
</html>
