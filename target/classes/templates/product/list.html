<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Products — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-box-seam me-2 text-primary"></i>Products</h2>
                    <p class="page-sub">Manage your product catalog</p>
                </div>
                <a th:href="@{/products/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>Add Product
                </a>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-box">
                <!-- Search -->
                <form th:action="@{/products}" method="get" class="mb-3">
                    <div class="input-group" style="max-width:400px">
                        <input type="text" name="search" class="form-control" placeholder="Search products..."
                               th:value="${search}"/>
                        <button class="btn btn-outline-primary" type="submit"><i class="bi bi-search"></i></button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary">Clear</a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Unit Price (LKR)</th>
                            <th>Factory Stock</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product, stat : ${products}">
                            <td th:text="${stat.count}">1</td>
                            <td>
                                <div class="model-name" th:text="${product.name}">Product Name</div>
                                <div class="text-muted small" th:text="${product.description}">Product Description</div>
                            </td>
                            <td>
                                <span class="badge bg-info" th:text="${product.category}">Cat</span>
                            </td>
                            <td><div class="price-tag" th:text="${#numbers.formatDecimal(product.unitPrice,1,'COMMA',2,'POINT')}">0.00</div></td>
                            <td>
                                <span th:class="${product.lowFactoryStock} ? 'badge bg-danger' : 'badge bg-success'"
                                      th:text="${product.totalFactoryStock} + ' units'">0</span>
                            </td>
                            <td>
                                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this product?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="6" class="text-center text-muted py-4">No products found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
