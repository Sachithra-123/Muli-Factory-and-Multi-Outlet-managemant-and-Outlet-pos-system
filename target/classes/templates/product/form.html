<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${pageTitle} + ' — DSI FMS'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2 class="page-title">
                    <i class="bi bi-box-seam me-2 text-primary"></i>
                    <span th:text="${pageTitle}">Product</span>
                </h2>
                <p class="page-sub">Fill in the product details below</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card-box">
                        <!-- Add form -->
                        <form th:if="${product.id == null}" th:action="@{/products/save}"
                              th:object="${product}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Cotton T-Shirt" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Short description..."></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Unit Price (LKR) <span class="text-danger">*</span></label>
                                    <input type="number" th:field="*{unitPrice}" class="form-control" step="0.01" min="0" placeholder="0.00" required/>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Category</label>
                                    <select th:field="*{category}" class="form-select">
                                        <option value="">-- Select Category --</option>
                                        <option value="Clothing">Clothing</option>
                                        <option value="Footwear">Footwear</option>
                                        <option value="Accessories">Accessories</option>
                                        <option value="Electronics">Electronics</option>
                                        <option value="Food">Food</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Product</button>
                                <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>

                        <!-- Edit form -->
                        <form th:if="${product.id != null}" th:action="@{/products/update/{id}(id=${product.id})}"
                              th:object="${product}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{name}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Unit Price (LKR) <span class="text-danger">*</span></label>
                                    <input type="number" th:field="*{unitPrice}" class="form-control" step="0.01" min="0" required/>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Category</label>
                                    <select th:field="*{category}" class="form-select">
                                        <option value="">-- Select Category --</option>
                                        <option value="Clothing">Clothing</option>
                                        <option value="Footwear">Footwear</option>
                                        <option value="Accessories">Accessories</option>
                                        <option value="Electronics">Electronics</option>
                                        <option value="Food">Food</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-2">
                                <button type="submit" class="btn btn-warning text-dark"><i class="bi bi-save me-1"></i>Update Product</button>
                                <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
