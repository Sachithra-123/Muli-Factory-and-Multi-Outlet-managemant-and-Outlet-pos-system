<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Employees — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-people me-2 text-orange"></i>Employees</h2>
                    <p class="page-sub">Active: <strong th:text="${activeCount}">0</strong> employees</p>
                </div>
                <a th:href="@{/employees/add}" class="btn btn-primary">
                    <i class="bi bi-person-plus me-1"></i>Add Employee
                </a>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-box">
                <form th:action="@{/employees}" method="get" class="mb-3">
                    <div class="input-group" style="max-width:400px">
                        <input type="text" name="search" class="form-control" placeholder="Search by name, position, department..."
                               th:value="${search}"/>
                        <button class="btn btn-outline-primary" type="submit"><i class="bi bi-search"></i></button>
                        <a th:href="@{/employees}" class="btn btn-outline-secondary">Clear</a>
                    </div>
                </form>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>#</th><th>Name</th><th>NIC</th><th>Position</th><th>Department</th><th>Factory</th>
                            <th>Salary (LKR)</th><th>Hire Date</th><th>Status</th><th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="emp, stat : ${employees}">
                            <td th:text="${stat.count}">1</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-circle me-3" th:text="${#strings.substring(emp.name,0,1)}">A</div>
                                    <div>
                                        <div class="model-name" th:text="${emp.name}">Name</div>
                                        <div class="text-muted small" th:text="${emp.email}">email</div>
                                    </div>
                                </div>
                            </td>
                            <td><span class="text-secondary-accent fw-medium" th:text="${emp.nic}">NIC</span></td>
                            <td><span class="stock-vibrant" th:text="${emp.position}">Position</span></td>
                            <td>
                                <span class="badge bg-info" th:text="${emp.department}">Dept</span>
                            </td>
                            <td><span class="text-primary fw-semibold" th:text="${emp.factory != null ? emp.factory.name : 'Head Office'}">Factory</span></td>
                            <td><div class="price-tag" th:text="${#numbers.formatDecimal(emp.salary,1,'COMMA',2,'POINT')}">0.00</div></td>
                            <td><small class="text-muted" th:text="${emp.hireDate}">Date</small></td>
                            <td>
                                <span class="badge bg-success" th:if="${emp.status == 'ACTIVE'}">Active</span>
                                <span class="badge bg-secondary" th:unless="${emp.status == 'ACTIVE'}">Inactive</span>
                            </td>
                            <td>
                                <a th:href="@{/employees/edit/{id}(id=${emp.id})}" class="btn btn-sm btn-outline-warning me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/employees/delete/{id}(id=${emp.id})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Delete this employee?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employees)}">
                            <td colspan="10" class="text-center text-muted py-4">No employees found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
