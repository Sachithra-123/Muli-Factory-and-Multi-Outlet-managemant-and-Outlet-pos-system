<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Sales History — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-receipt me-2 text-success"></i>Sales History</h2>
                    <p class="page-sub">All completed sales transactions</p>
                </div>
                <a th:href="@{/pos}" class="btn btn-success">
                    <i class="bi bi-cart3 me-1"></i>New Sale
                </a>
            </div>
            <div class="card-box">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Invoice #</th><th>Outlet</th><th>Cashier</th>
                            <th>Items</th><th>Total (LKR)</th><th>Payment</th><th>Date</th><th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="sale : ${sales}">
                            <td><span class="badge bg-primary" th:text="'#' + ${sale.id}">1</span></td>
                            <td th:text="${sale.outlet != null ? sale.outlet.name : 'N/A'}">Outlet</td>
                            <td th:text="${sale.cashier.fullName != null && !sale.cashier.fullName.isEmpty() ? sale.cashier.fullName : sale.cashier.username}">Cashier</td>
                            <td><span class="badge bg-secondary" th:text="${#lists.size(sale.saleItems)} + ' items'">0</span></td>
                            <td><strong class="text-success" th:text="${#numbers.formatDecimal(sale.totalAmount,1,'COMMA',2,'POINT')}">0.00</strong></td>
                            <td>
                                <span class="badge bg-info text-dark" th:text="${sale.paymentMethod}">CASH</span>
                            </td>
                            <td><small th:text="${#temporals.format(sale.saleDate,'dd MMM yyyy HH:mm')}">Date</small></td>
                            <td>
                                <a th:href="@{/pos/bill/{id}(id=${sale.id})}" class="btn btn-sm btn-outline-primary" target="_blank">
                                    <i class="bi bi-receipt me-1"></i>View Bill
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sales)}">
                            <td colspan="8" class="text-center text-muted py-4">No sales recorded yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
