# Core application settings
spring.application.name=Factory Management System
server.port=8080

# Database connection details (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/factory_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sachi2001@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate and JPA setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Template engine settings (Thymeleaf)
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Logging configuration for debugging
logging.level.com.factory=DEBUG
logging.level.org.springframework.security=INFO
