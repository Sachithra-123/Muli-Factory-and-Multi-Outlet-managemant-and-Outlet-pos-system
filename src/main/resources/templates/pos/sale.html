<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>POS — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        .pos-wrapper { display: flex; height: calc(100vh - 70px); overflow: hidden; background: transparent; }
        .pos-left { flex: 1; overflow-y: auto; padding: 2rem; }
        .pos-right { 
            width: 400px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.2);
        }
        .cart-header { 
            padding: 1.5rem; 
            background: rgba(139, 92, 246, 0.1); 
            border-bottom: 1px solid var(--border);
            color: #fff; 
        }
        .cart-items { flex: 1; overflow-y: auto; padding: 1.25rem; }
        .cart-item { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 12px; 
            padding: 1rem; 
            margin-bottom: 0.75rem; 
            border: 1px solid var(--border); 
            transition: all 0.2s;
        }
        .cart-item:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.15); }
        .cart-footer { 
            padding: 1.5rem; 
            border-top: 1px solid var(--border); 
            background: rgba(15, 23, 42, 0.4); 
        }
        .cart-total { font-size: 1.75rem; font-weight: 700; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .search-result-item { 
            cursor: pointer; 
            padding: 0.75rem 1rem; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s; 
            color: #f1f5f9;
        }
        .search-result-item:hover { background: rgba(139, 92, 246, 0.2); }
        .product-grid .prod-card { 
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .product-grid .prod-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.3); 
            border-color: var(--primary); 
            background: rgba(255,255,255,0.08);
        }
        #searchResults { 
            position: absolute; 
            z-index: 1000; 
            width: 100%; 
            background: #1e293b; 
            border: 1px solid var(--primary); 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            max-height: 300px; 
            overflow-y: auto; 
            display: none; 
            margin-top: 5px;
        }
        .empty-cart { text-align: center; color: var(--text-muted); padding: 4rem 1rem; }
        .qty-btn { 
            width: 30px; height: 30px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); 
            color: #fff; font-weight: bold; cursor: pointer; 
            display: inline-flex; align-items: center; justify-content: center; 
            transition: all 0.2s;
        }
        .qty-btn:hover { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content" style="padding:0; overflow:hidden;">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>

        <div class="pos-wrapper">
            <!-- LEFT: Product Search -->
            <div class="pos-left">
                <div class="page-header d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="page-title"><i class="bi bi-cart4 me-2 text-primary"></i>Point of Sale</h2>
                        <p class="page-sub">Checkout products and generate bills.</p>
                    </div>
                    <div class="card-box py-2 px-3 border-primary" style="background: #eff6ff;">
                        <small class="text-primary fw-bold"><i class="bi bi-person-badge me-1"></i>Current Session:</small>
                        <span class="fw-bold text-dark ms-1" th:text="${cashierName}">Cashier</span>
                        <button type="button" class="btn btn-sm btn-outline-danger ms-3 py-0 px-2" style="font-size:0.7rem;" 
                                data-bs-toggle="modal" data-bs-target="#closeSessionModal">
                            <i class="bi bi-box-arrow-right me-1"></i>Close Session
                        </button>
                    </div>
                </div>

                <!-- Outlet Select -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Select Outlet <span class="text-danger">*</span></label>
                    <select id="outletSelect" class="form-select">
                        <option value="">-- Select Outlet --</option>
                        <option th:each="o : ${outlets}" th:value="${o.id}" th:text="${o.name}"></option>
                    </select>
                </div>

                <!-- Product Search -->
                <div class="mb-4 position-relative">
                    <label class="form-label fw-semibold">Search Product</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" id="productSearch" class="form-control" placeholder="Type product name to search..."/>
                    </div>
                    <div id="searchResults"></div>
                </div>

                <!-- Product Cards Grid -->
                <div id="productGrid" class="row g-3 product-grid">
                    <div class="col-12 text-muted text-center py-4">
                        <i class="bi bi-search fs-2 d-block mb-2"></i>Search for products above to get started
                    </div>
                </div>
            </div>

            <!-- RIGHT: Cart -->
            <div class="pos-right">
                <div class="cart-header">
                    <h5 class="mb-0"><i class="bi bi-bag-check me-2"></i>Cart</h5>
                    <small id="cartCount">0 items</small>
                </div>

                <div class="cart-items" id="cartItems">
                    <div class="empty-cart" id="emptyCart">
                        <i class="bi bi-cart-x fs-1 d-block mb-3"></i>
                        Cart is empty
                    </div>
                </div>

                <div class="cart-footer">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted">Total:</span>
                        <div class="cart-total">LKR <span id="cartTotal">0.00</span></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Payment Method</label>
                        <select id="paymentMethod" class="form-select">
                            <option value="CASH">Cash</option>
                            <option value="CARD">Card</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <input type="number" id="cashReceived" class="form-control" placeholder="Cash received (LKR)" step="0.01"/>
                        <small class="text-muted">Change: <strong id="changeAmount">LKR 0.00</strong></small>
                    </div>

                    <button id="completeSaleBtn" class="btn btn-success w-100 fw-bold py-2 mt-2"
                            onclick="completeSale()">
                        <i class="bi bi-check-circle me-2"></i>Complete Sale
                    </button>
                    <button class="btn btn-outline-danger w-100 mt-2" onclick="clearCart()">
                        <i class="bi bi-x-circle me-2"></i>Clear Cart
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Hidden CSRF -->
<input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:data-header="${_csrf.headerName}"/>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/pos.js}"></script>
    <!-- Close Session Modal -->
    <div class="modal fade" id="closeSessionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 14px;">
                <div class="modal-body p-4 text-center">
                    <div class="mb-3 text-danger"><i class="bi bi-shield-lock-fill fs-1"></i></div>
                    <h5 class="fw-bold">Verify Identity</h5>
                    <p class="text-muted small">Please enter your password to generate the Z-Report and close the session.</p>
                    <form th:action="@{/reports/verify-z}" method="post">
                        <div class="mb-3">
                            <input type="password" name="password" class="form-control text-center" placeholder="Your Password" required/>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger">Confirm & Close</button>
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
