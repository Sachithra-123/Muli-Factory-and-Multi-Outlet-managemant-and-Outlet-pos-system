<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${pageTitle} + ' — DSI FMS'">Factory Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2 class="page-title"><i class="bi bi-building me-2 text-primary"></i><span th:text="${pageTitle}">Factory</span></h2>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card-box">
                        <form th:if="${factory.id == null}" th:action="@{/factories/save}" th:object="${factory}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Factory Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Colombo Textile Factory" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Location / Address</label>
                                <textarea th:field="*{location}" class="form-control" rows="2" placeholder="Full address..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="text" th:field="*{phone}" class="form-control" placeholder="e.g. 0112-789012"/>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Factory</button>
                                <a th:href="@{/factories}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                        <form th:if="${factory.id != null}" th:action="@{/factories/update/{id}(id=${factory.id})}" th:object="${factory}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Factory Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{name}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Location / Address</label>
                                <textarea th:field="*{location}" class="form-control" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="text" th:field="*{phone}" class="form-control"/>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning text-dark"><i class="bi bi-save me-1"></i>Update Factory</button>
                                <a th:href="@{/factories}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
