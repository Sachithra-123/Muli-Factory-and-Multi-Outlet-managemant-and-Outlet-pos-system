<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Factory Stock — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title">
                        <i class="bi bi-archive me-2 text-primary"></i>
                        Stock — <span th:text="${factory.name}">Factory</span>
                    </h2>
                    <p class="page-sub"><i class="bi bi-geo-alt me-1"></i><span th:text="${factory.location}">Location</span></p>
                </div>
                <a th:href="@{/factories}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
            </div>
            <div class="card-box">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>#</th><th>Product</th><th>Category</th><th>Price (LKR)</th><th>Qty in Factory</th><th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s, stat : ${stockList}">
                            <td th:text="${stat.count}">1</td>
                            <td><div class="model-name" th:text="${s.product.name}">Product</div></td>
                            <td><span class="badge bg-secondary" th:text="${s.product.category}">Cat</span></td>
                             <td><div class="price-tag" th:text="${#numbers.formatDecimal(s.product.unitPrice,1,'COMMA',2,'POINT')}">0.00</div></td>
                            <td>
                                <span th:class="${s.quantity <= s.lowStockThreshold} ? 'badge bg-danger fs-6' : 'badge bg-success fs-6'"
                                      th:text="${s.quantity} + ' units'">0</span>
                            </td>
                            <td>
                                 <span th:if="${s.quantity <= s.lowStockThreshold}" class="text-danger fw-bold"><i class="bi bi-exclamation-triangle me-1"></i>Low Stock</span>
                                 <span th:if="${s.quantity > s.lowStockThreshold}" class="stock-vibrant"><i class="bi bi-check-circle me-1"></i>OK</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(stockList)}">
                            <td colspan="6" class="text-center text-muted py-4">No stock records for this factory yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
