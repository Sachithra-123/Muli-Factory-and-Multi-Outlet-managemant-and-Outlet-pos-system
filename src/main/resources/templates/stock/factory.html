<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Factory Stock — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-archive me-2 text-warning"></i>Factory Stock</h2>
                    <p class="page-sub">Monitor and adjust factory inventory levels</p>
                </div>
                <div>
                    <span class="badge bg-danger fs-6" th:if="${lowStockCount > 0}">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${lowStockCount}">0</span> Low Stock Items
                    </span>
                    <span class="badge bg-success fs-6" th:if="${lowStockCount == 0}">
                        <i class="bi bi-check-circle me-1"></i>All Stocks Healthy
                    </span>
                </div>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-box">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Product</th>
                            <th>Factory</th>
                            <th>Category</th>
                            <th>Current Stock</th>
                            <th>Threshold</th>
                            <th>Status</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="stock, stat : ${stockList}"
                            th:class="${stock.lowStock} ? 'table-danger' : ''">
                            <td th:text="${stat.count}">1</td>
                            <td>
                                <strong th:text="${stock.product.name}">Product</strong>
                                <div class="text-muted small" th:text="${stock.product.category}">Cat</div>
                            </td>
                            <td><span class="text-primary fw-semibold" th:text="${stock.factory.name}">Factory</span></td>
                            <td><span class="badge bg-secondary" th:text="${stock.product.category}">Cat</span></td>
                            <td>
                                <span class="fw-bold fs-5" th:text="${stock.quantity}">0</span>
                                <span class="text-muted small"> units</span>
                            </td>
                            <td th:text="${stock.lowStockThreshold}">10</td>
                            <td>
                                <span th:if="${stock.lowStock}" class="badge bg-danger"><i class="bi bi-exclamation-triangle me-1"></i>Low Stock</span>
                                <span th:unless="${stock.lowStock}" class="badge bg-success"><i class="bi bi-check me-1"></i>OK</span>
                            </td>
                            <td><small th:text="${#temporals.format(stock.updatedAt,'dd MMM yyyy HH:mm')}">Date</small></td>
                            <td>
                                <!-- Add Stock Button -->
                                <button class="btn btn-sm btn-success me-1" data-bs-toggle="modal"
                                        th:data-bs-target="'#addModal' + ${stock.id}">
                                    <i class="bi bi-plus-circle"></i> Add
                                </button>
                                <!-- Adjust Button -->
                                <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal"
                                        th:data-bs-target="'#adjustModal' + ${stock.id}">
                                    <i class="bi bi-pencil"></i> Set
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modals for each stock item moved outside wrapper to prevent z-index issues -->
<div th:each="stock : ${stockList}">
    <!-- Add Stock Modal -->
    <div class="modal fade" th:id="'addModal' + ${stock.id}" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h6 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Add Stock</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/factory-stock/add/{id}(id=${stock.id})}" method="post">
                    <div class="modal-body">
                        <p class="fw-bold" th:text="${stock.product.name}">Product</p>
                        <p class="text-muted small">Current: <span th:text="${stock.quantity}">0</span> units</p>
                        <label class="form-label">Quantity to Add</label>
                        <input type="number" name="addQty" class="form-control" min="1" value="10" required/>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success btn-sm">Add Stock</button>
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Adjust Stock Modal -->
    <div class="modal fade" th:id="'adjustModal' + ${stock.id}" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h6 class="modal-title"><i class="bi bi-pencil me-2"></i>Set Quantity</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/factory-stock/adjust/{id}(id=${stock.id})}" method="post">
                    <div class="modal-body">
                        <p class="fw-bold" th:text="${stock.product.name}">Product</p>
                        <label class="form-label">New Quantity</label>
                        <input type="number" name="quantity" class="form-control" th:value="${stock.quantity}" min="0" required/>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-warning btn-sm text-dark">Update</button>
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
