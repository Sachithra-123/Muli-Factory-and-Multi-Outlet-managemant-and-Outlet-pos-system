<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Outlets — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <h2 class="page-title"><i class="bi bi-shop me-2 text-info"></i>Outlets</h2>
                <a th:href="@{/outlets/add}" class="btn btn-info text-white">
                    <i class="bi bi-plus-circle me-1"></i>Add Outlet
                </a>
            </div>

            <!-- Success / Error Messages -->
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-1"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-box">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Outlet Name</th>
                            <th>Location</th>
                            <th>Phone</th>
                            <th>Created</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="o, stat : ${outlets}">
                            <td th:text="${stat.count}">1</td>
                            <td><div class="model-name" th:text="${o.name}">Outlet</div></td>
                            <td><span class="stock-vibrant" th:text="${o.location}">Location</span></td>
                            <td><span class="text-muted" th:text="${o.phone}">Phone</span></td>
                            <td><span class="text-secondary-accent" th:text="${o.createdAt != null ? #temporals.format(o.createdAt, 'yyyy-MM-dd') : '—'}">Date</span></td>
                            <td class="text-center">
                                <a th:href="@{/outlets/{id}/stock(id=${o.id})}" class="btn btn-sm btn-outline-info me-1" title="View Stock">
                                    <i class="bi bi-archive"></i>
                                </a>
                                <a th:href="@{/outlets/edit/{id}(id=${o.id})}" class="btn btn-sm btn-outline-warning me-1" title="Edit">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/outlets/delete/{id}(id=${o.id})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Are you sure you want to delete this outlet?');" title="Delete">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(outlets)}">
                            <td colspan="6" class="text-center text-muted py-4">No outlets found. Click "Add Outlet" to create one.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
