<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Sales Report — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        @media print { .no-print { display: none !important; } .card-box { box-shadow: none; border: 1px solid #dee2e6; } }
    </style>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-bar-chart me-2 text-success"></i>Daily Sales Report</h2>
                    <p class="page-sub">Sales summary for selected date</p>
                </div>
                <button onclick="window.print()" class="btn btn-outline-secondary no-print">
                    <i class="bi bi-printer me-1"></i>Print
                </button>
            </div>

            <!-- Date Filter -->
            <div class="card-box mb-4 no-print">
                <form th:action="@{/reports/sales}" method="get" class="row g-2 align-items-end">
                    <div class="col-auto">
                        <label class="form-label fw-semibold">Select Date</label>
                        <input type="date" name="date" class="form-control" th:value="${reportDate}"/>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-success"><i class="bi bi-search me-1"></i>Generate</button>
                    </div>
                </form>
            </div>

            <!-- Summary -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card stat-green">
                        <div class="stat-icon"><i class="bi bi-currency-dollar"></i></div>
                        <div class="stat-info">
                            <div class="stat-number">LKR <span th:text="${#numbers.formatDecimal(totalRevenue,1,'COMMA',2,'POINT')}">0.00</span></div>
                            <div class="stat-label">Total Revenue</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card stat-blue">
                        <div class="stat-icon"><i class="bi bi-receipt"></i></div>
                        <div class="stat-info">
                            <div class="stat-number" th:text="${#lists.size(sales)}">0</div>
                            <div class="stat-label">Total Transactions</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card stat-orange">
                        <div class="stat-icon"><i class="bi bi-calendar"></i></div>
                        <div class="stat-info">
                            <div class="stat-number" th:text="${reportDate}">Date</div>
                            <div class="stat-label">Report Date</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-box">
                <h5 class="mb-3 fw-bold">Transaction Details</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr><th>#</th><th>Invoice</th><th>Outlet</th><th>Cashier</th><th>Items</th><th>Total (LKR)</th><th>Payment</th><th>Time</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="sale, stat : ${sales}">
                            <td><span class="text-muted">[[${stat.count}]]</span></td>
                            <td><a th:href="@{/pos/bill/{id}(id=${sale.id})}" target="_blank" class="no-print fw-bold text-primary">#<span th:text="${sale.id}">0</span></a></td>
                            <td><span class="fw-medium" th:text="${sale.outlet != null ? sale.outlet.name : 'N/A'}">Outlet</span></td>
                            <td><span class="fw-medium text-dark" th:text="${sale.cashier.fullName != null && !sale.cashier.fullName.isEmpty() ? sale.cashier.fullName : sale.cashier.username}">Cashier</span></td>
                            <td><span th:text="${#lists.size(sale.saleItems)}">0</span></td>
                            <td><strong class="text-emerald" th:text="${#numbers.formatDecimal(sale.totalAmount,1,'COMMA',2,'POINT')}">0.00</strong></td>
                            <td><span class="badge bg-success" th:text="${sale.paymentMethod}">CASH</span></td>
                            <td><small class="text-muted" th:text="${#temporals.format(sale.saleDate,'HH:mm')}">Time</small></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sales)}">
                            <td colspan="8" class="text-center text-muted py-4">No sales for this date.</td>
                        </tr>
                        </tbody>
                        <tfoot th:if="${!#lists.isEmpty(sales)}">
                        <tr style="background:rgba(52,211,153,0.08); border-top: 1px solid rgba(52,211,153,0.3);">
                            <td colspan="5" class="text-end" style="color:#f1f5f9; font-weight:700; letter-spacing:1px;">TOTAL</td>
                            <td><strong style="color:#6ee7b7;">LKR <span th:text="${#numbers.formatDecimal(totalRevenue,1,'COMMA',2,'POINT')}">0.00</span></strong></td>
                            <td colspan="2"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
