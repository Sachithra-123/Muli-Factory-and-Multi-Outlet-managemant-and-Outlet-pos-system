<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Transfer Report — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>@media print { .no-print { display: none !important; } }</style>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-truck me-2 text-primary"></i>Transfer Report</h2>
                    <p class="page-sub">Factory to outlet stock movement history</p>
                </div>
                <button onclick="window.print()" class="btn btn-outline-secondary no-print">
                    <i class="bi bi-printer me-1"></i>Print
                </button>
            </div>

            <div class="card-box mb-4 no-print">
                <form th:action="@{/reports/transfers}" method="get" class="row g-2 align-items-end">
                    <div class="col-auto">
                        <label class="form-label fw-semibold">From Date</label>
                        <input type="date" name="from" class="form-control" th:value="${from}"/>
                    </div>
                    <div class="col-auto">
                        <label class="form-label fw-semibold">To Date</label>
                        <input type="date" name="to" class="form-control" th:value="${to}"/>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-search me-1"></i>Filter</button>
                        <a th:href="@{/reports/transfers}" class="btn btn-outline-secondary ms-1">All</a>
                    </div>
                </form>
            </div>

            <div class="card-box">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr><th>#</th><th>Product</th><th>Outlet</th><th>Qty</th><th>Date</th><th>Status</th><th>Note</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="t, stat : ${transfers}">
                            <td th:text="${stat.count}">1</td>
                            <td><div class="model-name" th:text="${t.product.name}">Product</div></td>
                            <td th:text="${t.outlet.name}">Outlet</td>
                            <td><span class="badge bg-primary" th:text="${t.quantity} + ' units'">0</span></td>
                            <td th:text="${#temporals.format(t.transferDate,'dd MMM yyyy HH:mm')}">Date</td>
                            <td><span class="badge bg-success" th:text="${t.status}">Done</span></td>
                            <td><small class="text-muted" th:text="${t.note != null ? t.note : '—'}">—</small></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(transfers)}">
                            <td colspan="7" class="text-center text-muted py-4">No transfers found for this period.</td>
                        </tr>
                        </tbody>
                        <tfoot th:if="${!#lists.isEmpty(transfers)}">
                        <tr class="table-light fw-bold">
                            <td colspan="3" class="text-end">Total Transfers:</td>
                            <td colspan="4" th:text="${#lists.size(transfers)} + ' records'">0</td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
