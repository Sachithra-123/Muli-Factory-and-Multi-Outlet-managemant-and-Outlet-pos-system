<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Stock Report — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>@media print { .no-print { display: none !important; } }</style>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-clipboard-data me-2 text-info"></i>Stock Report</h2>
                    <p class="page-sub">Current inventory levels across factory and outlets</p>
                </div>
                <button onclick="window.print()" class="btn btn-outline-secondary no-print">
                    <i class="bi bi-printer me-1"></i>Print
                </button>
            </div>

            <!-- Factory Stock -->
            <div class="card-box mb-4">
                <h5 class="mb-3 fw-bold"><i class="bi bi-building me-2 text-warning"></i>Factory Stock</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr><th>#</th><th>Product</th><th>Category</th><th>Price (LKR)</th><th>Qty</th><th>Threshold</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="s, stat : ${factoryStock}" th:class="${s.lowStock} ? 'table-warning' : ''">
                            <td th:text="${stat.count}">1</td>
                            <td><strong th:text="${s.product.name}">Product</strong></td>
                            <td><span class="badge bg-secondary" th:text="${s.product.category}">Cat</span></td>
                            <td th:text="${#numbers.formatDecimal(s.product.unitPrice,1,'COMMA',2,'POINT')}">0.00</td>
                            <td><strong th:text="${s.quantity}">0</strong></td>
                            <td th:text="${s.lowStockThreshold}">10</td>
                            <td>
                                <span th:if="${s.lowStock}" class="badge bg-danger">Low</span>
                                <span th:unless="${s.lowStock}" class="badge bg-success">OK</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Outlet Stock per Outlet -->
            <div th:each="outlet : ${outlets}" class="card-box mb-4">
                <h5 class="mb-3 fw-bold">
                    <i class="bi bi-shop me-2 text-info"></i>
                    <span th:text="${outlet.name}">Outlet</span>
                    <small class="text-muted fw-normal ms-2" th:text="${outlet.location}"></small>
                </h5>
                <div class="table-responsive">
                    <table class="table table-sm table-hover align-middle">
                        <thead class="table-secondary">
                        <tr><th>#</th><th>Product</th><th>Qty Available</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="s, stat : ${outlet.outletStocks}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${s.product.name}">Product</td>
                            <td>
                                <span th:class="${s.quantity == 0} ? 'badge bg-danger' : 'badge bg-success'"
                                      th:text="${s.quantity} + ' units'">0</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(outlet.outletStocks)}">
                            <td colspan="3" class="text-muted text-center py-2">No stock in this outlet</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
