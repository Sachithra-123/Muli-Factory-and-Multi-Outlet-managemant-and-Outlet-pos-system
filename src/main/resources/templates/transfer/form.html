<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>New Transfer — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header">
                <h2 class="page-title"><i class="bi bi-arrow-left-right me-2 text-success"></i>New Stock Transfer</h2>
                <p class="page-sub">Transfer products from factory to an outlet</p>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card-box">
                        <div class="alert alert-info mb-4">
                            <i class="bi bi-info-circle me-2"></i>
                            Stock will be automatically deducted from the selected source factory and added to the outlet.
                        </div>
                        <form th:action="@{/transfers/save}" th:object="${transferDTO}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Source Factory <span class="text-danger">*</span></label>
                                <select th:field="*{factoryId}" class="form-select" required>
                                    <option value="">-- Select Source Factory --</option>
                                    <option th:each="f : ${factories}" th:value="${f.id}" th:text="${f.name}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product <span class="text-danger">*</span></label>
                                <select th:field="*{productId}" class="form-select" required>
                                    <option value="">-- Select Product --</option>
                                    <option th:each="p : ${products}"
                                            th:value="${p.id}"
                                            th:text="${p.name} + ' (Total Stock: ' + ${p.totalFactoryStock} + ')'">
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Outlet <span class="text-danger">*</span></label>
                                <select th:field="*{outletId}" class="form-select" required>
                                    <option value="">-- Select Outlet --</option>
                                    <option th:each="o : ${outlets}" th:value="${o.id}" th:text="${o.name}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
                                <input type="number" th:field="*{quantity}" class="form-control" min="1" placeholder="Enter quantity to transfer" required/>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Note (Optional)</label>
                                <input type="text" th:field="*{note}" class="form-control" placeholder="e.g. Monthly restocking"/>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success"><i class="bi bi-send me-1"></i>Transfer Stock</button>
                                <a th:href="@{/transfers}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
