<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Stock Transfers — DSI FMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/sidebar :: navbar}"></div>
        <div class="content-area">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="page-title"><i class="bi bi-arrow-left-right me-2 text-success"></i>Stock Transfers</h2>
                    <p class="page-sub">History of factory-to-outlet stock movements</p>
                </div>
                <a th:href="@{/transfers/new}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i>New Transfer
                </a>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card-box">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Product</th>
                            <th>Outlet</th>
                            <th>Qty Transferred</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Note</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t, stat : ${transfers}">
                            <td th:text="${stat.count}">1</td>
                            <td><strong style="color:#f8fafc;" th:text="${t.product.name}">Product</strong></td>
                            <td><span style="background:rgba(56,189,248,0.15); color:#7dd3fc; border:1px solid rgba(56,189,248,0.4); padding:0.35rem 0.8rem; border-radius:8px; font-weight:600;" th:text="${t.outlet.name}">Outlet</span></td>
                            <td><span style="background:rgba(168,85,247,0.15); color:#d8b4fe; border:1px solid rgba(168,85,247,0.4); padding:0.35rem 0.8rem; border-radius:8px; font-weight:600;" th:text="${t.quantity} + ' units'">0</span></td>
                            <td><small style="color:#67e8f9; font-weight:500;" th:text="${#temporals.format(t.transferDate,'dd MMM yyyy HH:mm')}">Date</small></td>
                            <td>
                                <span class="badge bg-success" th:if="${t.status == 'COMPLETED'}">Completed</span>
                                <span class="badge bg-warning" style="color:#1a1a2e;" th:if="${t.status == 'PENDING'}">Pending</span>
                            </td>
                            <td><small style="color:#94a3b8;" th:text="${t.note != null ? t.note : '—'}">Note</small></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(transfers)}">
                            <td colspan="7" class="text-center text-muted py-4">No transfers recorded yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
